apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 8000
          name: http-web
        command: ["/bin/sh"]
        args: ["-c", "sed -i 's/listen 80;/listen 8000;/' /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"]
{{- if .Values.monitoring.enabled }}
- name: nginx-exporter
  image: nginx/nginx-prometheus-exporter:latest
  args: ["-nginx.scrape-uri=http://localhost:8000/nginx_status"]
  ports:
  - containerPort: 9113
    name: metrics
{{- end }}

