apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: grafana
spec:
  tls:
    - hosts:
        - lia-prod.cloudist.solutions
      secretName: grafana-tls-secret
  rules:
    - host: lia-prod.cloudist.solutions
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80