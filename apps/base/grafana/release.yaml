cat > apps/base/grafana/release.yaml << 'EOF'
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "8.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    service:
      type: ClusterIP
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    grafana.ini:
      server:
        serve_from_sub_path: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://prometheus-server.prometheus.svc.cluster.local
            access: proxy
            isDefault: true
            jsonData:
              timeInterval: 30s
          - name: Loki
            type: loki
            uid: loki
            url: http://loki.loki.svc.cluster.local:3100
            access: proxy
            jsonData:
              maxLines: 1000
          - name: Tempo
            type: tempo
            uid: tempo
            url: http://tempo.tempo.svc.cluster.local:3200
            access: proxy
            jsonData:
              httpMethod: GET
              lokiSearch:
                datasourceUid: loki
              nodeGraph:
                enabled: true
              traceQuery:
                timeShiftEnabled: true
EOF