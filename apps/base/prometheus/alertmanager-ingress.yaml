apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: prometheus
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`lia-kube.cloudist.solutions`) && PathPrefix(`/alertmanager`)"
      kind: Rule
      services:
        - name: prometheus-alertmanager
          port: 9093
  tls:
    secretName: prometheus-tls-secret