apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: nginx          
spec:
  chart:
    spec:
      version: ">=15.0.0"
  test:
    enable: true
  values:
    replicaCount: 2
    service:
      port: 80
    ingress:
      enabled: true
      hosts:
      - host: nginx.staging.lia-kube.cloudist.solutions
