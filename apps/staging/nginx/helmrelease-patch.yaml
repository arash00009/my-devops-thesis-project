apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: nginx
spec:
  chart:
    spec:
      version: ">=15.0.0"          # Auto-upgrade to latest 15.x!
  test:
    enable: true                    # Run helm tests
  values:
    replicaCount: 2                 # Staging: 2 pods
    service:
      port: 80
    ingress:
      enabled: true
      hosts:
      - host: nginx.staging.lia-kube.cloudist.solutions
