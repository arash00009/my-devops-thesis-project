apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/prometheus
  - alertmanager-ingress.yaml
patches:
  - path: helmrelease-patch.yaml
    target:
      kind: HelmRelease
      name: prometheus
  - path: patch.yaml
    target:
      kind: Ingress
      name: prometheus
  - path: patch.yaml
    target:
      kind: Certificate
      name: prometheus-tls