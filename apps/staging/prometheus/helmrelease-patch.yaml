apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  values:
    server:
      persistentVolume:
        enabled: true
        size: 8Gi
      statefulSet:
        enabled: true
      extraArgs:
        web.config.file: /etc/web-config/web-config.yml
      extraVolumes:
        - name: web-config
          secret:
            secretName: prometheus-basic-auth
      extraVolumeMounts:
        - name: web-config
          mountPath: /etc/web-config
      livenessProbeSpec:
        tcpSocket:
          port: 9090
        initialDelaySeconds: 30
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbeSpec:
        tcpSocket:
          port: 9090
        initialDelaySeconds: 30
        periodSeconds: 5
        timeoutSeconds: 4
        failureThreshold: 3
    configmapReload:
      reloadUrl: "http://$(PROMETHEUS_USERNAME):$(PROMETHEUS_PASSWORD)@127.0.0.1:9090/-/reload"
      env:
        - name: PROMETHEUS_USERNAME
          valueFrom:
            secretKeyRef:
              name: prometheus-exporter-auth
              key: username
        - name: PROMETHEUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: prometheus-exporter-auth
              key: password