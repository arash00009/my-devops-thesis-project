apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 12h
  chartRef:
    kind: OCIRepository
    name: cert-manager
  values:
    podDnsPolicy: None
    podDnsConfig:
      nameservers:
        - 8.8.8.8
    crds:
      enabled: true
      keep: false
    extraArgs:
      - --acme-http01-solver-nameservers=8.8.8.8:53