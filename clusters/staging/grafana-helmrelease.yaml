apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana
      version: "8.2.5"
      sourceRef:
        kind: HelmRepository
        name: grafana
  targetNamespace: grafana
  values:
    grafanaAdminPassword: admin123

