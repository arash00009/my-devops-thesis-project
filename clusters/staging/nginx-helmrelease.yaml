apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: flux-system # Själva objektet ligger här
spec:
  targetNamespace: nginx   # Men appen deployas till nginx-namespacet
  releaseName: my-nginx
  interval: 15m
  chart:
    spec:
      chart: ./charts/my-nginx  # VIKTIGT: Sökväg från repots rot
      sourceRef:
        kind: GitRepository
        name: flux-system      # Refererar till ditt eget repo
        namespace: flux-system
  values:
    replicaCount: 3
    monitoring:
      enabled: true
