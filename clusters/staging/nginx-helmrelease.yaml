apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: flux-system # HR ligger ofta här, men deployar till targetNamespace
spec:
  targetNamespace: nginx
  interval: 15m
  chart:
    spec:
      chart: ./charts/nginx-test # Flux läser lokalt från ditt repo!
      sourceRef:
        kind: GitRepository
        name: flux-system
  values:
    replicaCount: 2 # Här kan du enkelt ändra för staging!
    monitoring:
      enabled: true
