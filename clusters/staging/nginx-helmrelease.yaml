apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-nginx
  namespace: flux-system          # HelmRelease in flux-system
spec:
  targetNamespace: nginx          # This app deployas to nginx namespace!
  chart:
    spec:
      chart: ./charts/my-nginx
      sourceRef:
        kind: GitRepository
        name: flux-system
  values:
    replicaCount: 3
    monitoring:
      enabled: true

