apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: "monitoring-basic-auth@kubernetescrd,monitoring-ratelimit@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - prometheus.example.com  # ← ÄNDRA DIN DOMÄN
      secretName: prometheus-tls
  rules:
    - host: prometheus.example.com  # ← ÄNDRA DIN DOMÄN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-prometheus-stack-kube-prom-prometheus
                port:
                  number: 9090
