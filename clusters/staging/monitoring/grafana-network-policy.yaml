apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-to-grafana
  namespace: grafana # Flytta hit
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana # Kontrollera att detta matchar din pod
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flux-system # Tillåt Traefik
