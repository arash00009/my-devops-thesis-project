apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "55.8.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  targetNamespace: monitoring
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patchesJson6902:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: my-prometheus-stack-grafana
            patch:
              - op: add
                path: /spec/template/spec/containers/0/env
                value:
                  - name: GF_SECURITY_ADMIN_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: grafana-admin
                        key: admin-password
  values:
    prometheus:
      prometheusSpec:
        retention: 30d
        scrapeInterval: 30s
        evaluationInterval: 30s
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 10Gi
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
    
    grafana:
      enabled: true
      adminUser: admin
      adminPassword: "ChangeMe!Secure123$"  # Överskrivs av Secret
      persistence:
        enabled: true
        storageClassName: local-storage
        size: 5Gi
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://my-prometheus-stack-kube-prom-prometheus:9090
              access: proxy
              isDefault: true
    
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 1Gi
    
    prometheus-node-exporter:
      enabled: true
    
    kube-state-metrics:
      enabled: true
    
    prometheusOperator:
      enabled: true
