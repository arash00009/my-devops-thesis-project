cat > prometheus-stack.yaml << 'EOF'
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  
  # Dependency: storage-class måste vara ready först
  dependsOn:
    - name: local-storage
      namespace: monitoring
  
  # Officiell kube-prometheus-stack från prometheus-community
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "55.8.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  
  targetNamespace: monitoring
  
  # Install/Upgrade strategi
  install:
    crds: Create
    remediation:
      retries: 3
  
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  
  # Values från officiella chartet + dina custom värden
  values:
    # Prometheus config
    prometheus:
      prometheusSpec:
        retention: 30d
        scrapeInterval: 30s
        evaluationInterval: 30s
        
        # Storage med local-storage StorageClass
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 10Gi
        
        # Din custom scrape config från Helm Chart
        additionalScrapeConfigs: []
        
        # Resurser
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
    
    # Grafana config
    grafana:
      enabled: true
      adminPassword: "password123"
      persistence:
        enabled: true
        storageClassName: local-storage
        size: 5Gi
      
      # Datasource
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://my-prometheus-stack-kube-prom-prometheus:9090
              access: proxy
              isDefault: true
    
    # AlertManager config
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 1Gi
    
    # Node Exporter
    prometheus-node-exporter:
      enabled: true
    
    # Kube State Metrics
    kube-state-metrics:
      enabled: true
    
    # Prometheus Operator
    prometheusOperator:
      enabled: true
EOF
