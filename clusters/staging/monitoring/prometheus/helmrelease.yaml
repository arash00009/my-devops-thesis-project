apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "55.8.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  targetNamespace: monitoring
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    prometheus:
      prometheusSpec:
        scrapeInterval: 30s
        evaluationInterval: 30s
        
        additionalScrapeConfigs: 
          - job_name: 'windows-local'
            scrape_interval: 30s
            scrape_timeout: 10s
            static_configs:
              - targets: ['192.168.1.224:9182']  # ← Uppdatera med DIN IP
                labels:
                  instance: 'windows-dev'
                  service: 'windows-exporter'
                  environment: 'local'
                  os: 'windows'
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        retention: 30d
        
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 10Gi
        
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
    
    grafana:
      enabled: true
      adminPassword: "password123"
      persistence:
        enabled: true
        size: 5Gi
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              url: http://prometheus-kube-prometheus-prometheus:9090
              access: proxy
              isDefault: true
    
    prometheusOperator:
      enabled: true
    
    prometheus-node-exporter:
      enabled: true
    
    kube-state-metrics:
      enabled: true
    
    storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-storage
              resources:
                requests:
                  storage: 1Gi
