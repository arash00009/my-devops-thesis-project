# Prometheus Helm Chart Values - Säker konfiguration

prometheus:
  prometheusSpec:
    # Resurser
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    
    # Retention
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 10Gi
    
    # Service Monitor selectors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    
    # Network Policy - TÖ INTE FRÅN EXTERN
    # (Implementeras separat med NetworkPolicy)
    
    # Säkerhet: Skrivskyddad root-filsystem
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      fsReadOnlyRootFilesystem: true

grafana:
  enabled: true
  adminPassword: Password123
  
  # Persist data
  persistence:
    enabled: true
    size: 5Gi
  
  # Datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: true

prometheus-node-exporter:
  enabled: true

kube-state-metrics:
  enabled: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 2Gi
