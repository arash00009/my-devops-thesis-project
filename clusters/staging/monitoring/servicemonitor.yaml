apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: windows-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: windows-exporter
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: v1
kind: Service
metadata:
  name: windows-exporter
  namespace: monitoring
  labels:
    app: windows-exporter
spec:
  type: ExternalName
  externalName: windows-exporter.example.local  # ← ÄNDRA TILL DIN HOST
  ports:
    - name: metrics
      port: 9182
      targetPort: 9182
