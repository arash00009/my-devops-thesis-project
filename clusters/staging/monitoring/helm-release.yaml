apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: my-prometheus-stack
  namespace: monitoring # Namespacet där Prometheus ska bo
spec:
  releaseName: my-prometheus-stack
  targetNamespace: monitoring
  storageNamespace: monitoring
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 55.8.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Här lägger vi in dina anpassade inställningar (Values)
    prometheus:
      prometheusSpec:
        externalUrl: "https://194.103.192.81/prometheus"
        routePrefix: /prometheus
    
    grafana:
      enabled: true
      # Säkerhetshärdning som vi pratade om tidigare
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      grafana.ini:
        server:
          root_url: "https://194.103.192.81/grafana/"
          serve_from_sub_path: true
