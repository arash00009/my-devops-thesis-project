---
# 1. Standard: Förbjud ALLT in och ut (Default Deny)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-default-deny
  namespace: nginx
spec:
  podSelector: {} # Väljer alla poddar
  policyTypes:
  - Ingress
  - Egress

---
# 2. Tillåt endast Traefik på port 80 (Kontrollerat tillträde)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-ingress
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flux-system # Endast trafik från Traefik/Flux-namespacet
    ports:
    - protocol: TCP
      port: 80

# Lägg till detta under "ingress" i din befintliga NetworkPolicy
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring # Tillåt trafik från monitoring-namespacet
    ports:
    - protocol: TCP
      port: 9113 # Exporterns port

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-secure-enclave
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # TILLÅT: Trafik från Traefik (via flux-system namespace)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flux-system
    ports:
    - protocol: TCP
      port: 80
  egress:
  # TILLÅT: Endast DNS-trafik till kube-system (så podden kan hitta servicenamn)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # NOTERA: Ingen regel för Google/Internet här = All annan Egress blockeras!
