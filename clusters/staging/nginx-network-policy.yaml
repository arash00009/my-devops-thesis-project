apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-allow-traefik
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {} # Tillåt Traefik från vilket namespace som helst
    ports:
    - protocol: TCP
      port: 80
  egress:
  - {} # Tillåt all utgående trafik (DNS + Svarstrafik)
