i---
# 1. Deny all ingress (Säkerhetsbas)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all-ingress
  namespace: nginx
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# 2. Allow Ingress från Traefik (Dörren in)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-traefik
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {} # Tillåter Traefik oavsett identitetsstrul
    ports:
    - protocol: TCP
      port: 80

---
# 3. Allow Egress för Svarstrafik (Lösningen på Empty Reply)
# Utan denna kan Nginx ta emot paketet men inte skicka tillbaka webbsidan!
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-replies
  namespace: nginx
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Egress
  egress:
  - to: [] # Tillåter podden att skicka svarstrafik utåt
