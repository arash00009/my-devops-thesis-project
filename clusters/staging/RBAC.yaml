---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-manager-sa # <--- Kontrollera detta namn!
  namespace: nginx
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-full-access-role
  namespace: nginx
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ... resten av reglerna ...
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-manager-binding
  namespace: nginx
subjects:
- kind: ServiceAccount
  name: nginx-manager-sa # <--- Måste vara exakt samma som ovan!
  namespace: nginx
roleRef:
  kind: Role
  name: nginx-full-access-role
  apiGroup: rbac.authorization.k8s.io
