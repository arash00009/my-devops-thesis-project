apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/my-cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    - patch: |-
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        metadata:
          name: podinfo
          namespace: flux-system
        spec:
          scaleTargetRef:      # Berättar vad som ska skalas
            apiVersion: apps/v1
            kind: Deployment
            name: podinfo
          minReplicas: 3
          maxReplicas: 10      # Måste vara större än 0!
      target:
        kind: HorizontalPodAutoscaler
        name: podinfo
