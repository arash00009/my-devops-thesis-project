---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo
  namespace: flux-system
spec:
  interval: 30m0s
  path: ./kustomize
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: podinfo
  targetNamespace: default
  timeout: 3m0s
  wait: true
  patches:
    - target:
        kind: HorizontalPodAutoscaler
        name: podinfo
      patch: |
        - op: replace
          path: /spec/minReplicas
          value: 3
        - op: replace
          path: /spec/maxReplicas
          value: 10
